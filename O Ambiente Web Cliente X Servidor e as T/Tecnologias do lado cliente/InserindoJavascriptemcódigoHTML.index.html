                    <!DOCTYPE html>
                    <html lang="pt-br">
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <title>Inserindo Javascript em código HTML
                    </title>
                
                    </head>
                    <body id="myCorpo">
                        <h2 class="myTexto">What Can JavaScript Do?</h2>

                <p class="myTexto">JavaScript can change HTML attribute values.</p>
            
                <p class="myTexto">In this case JavaScript changes the value of the src (source) attribute of an image.</p>
                <button onclick="document.getElementById('myImage').src='pic_bulbon.gif'; document.getElementById('myCorpo').style.backgroundColor = 'white'; document.getElementById('myTexto').style.color = 'black' ">Turn on the light</button>
                

                <img id="myImage" src="pic_bulboff.gif" style="width:100px" style="background-color: transparent;">

                <button onclick="document.getElementById('myImage').src='pic_bulboff.gif'; document.getElementById('myCorpo').style.backgroundColor = 'black'; ; document.getElementById('myTexto').style.color = 'white'">Turn off the light</button>
               
                    </body>
                    </html>
